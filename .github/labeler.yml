bug:
  - '(?i)(bug|error|exception|traceback|crash|not working|broken|failing|does not work|stopped working)'

enhancement:
  - '(?i)(feature|enhancement|feature request|add support|support for|request|wish|suggestion|could you|can you add)'

question:
  - '(?i)(question|how to|what is|help|explain|why|confused|understand)'

documentation:
  - '(?i)(docs|documentation|readme|example|guide|how to configure)'

docker:
  - '(?i)(docker|container|image|pull|compose|ghcr|registry|dockerfile)'

"home assistant":
  - '(?i)(home assistant|addon|add-on|homeassistant)'

configuration:
  - '(?i)(config|setup|install|options|settings|configure|parameter)'

performance:
  - '(?i)(slow|performance|memory|cpu|hang|freeze|timeout|lagging)'

dependencies:
  - '(?i)(dependency|requirement|package|pip|version incompatible)'
